name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run CI task
        run: deno task ci

  e2e:
    needs: check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install npm deps
        run: |
          cd Final-projesi
          npm install

      - name: Install Playwright browsers
        run: |
          cd Final-projesi
          npx playwright install --with-deps

      - name: Start app
        run: |
          cd Final-projesi
          deno task preview &

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:8000 >/dev/null; then
              echo "server up"; break
            fi
            sleep 1
          done

      - name: Run E2E tests
        working-directory: Final-projesi
        run: |
          npx playwright test --config=playwright.config.ts
